# ─────────────────────────────────────────────────────────────────────────────
# Models & prompts (spec §6) — CONFIG, never hardcoded in source.
#
# Principle: the translator and the critic must be DIFFERENT model families so
# the judge does not share the generator's blind spots. Pin exact IDs per
# deployment; swap providers without touching code.
#
# If a provider's API key is absent at runtime, that stage falls back to a
# deterministic fixture/heuristic (mode: fixture) so the demo always runs.
# ─────────────────────────────────────────────────────────────────────────────

translator:
  provider: anthropic          # anthropic | openai | fixture
  model: claude-sonnet-4-6     # chosen for register/tone consistency over long docs
  prompt_version: translator-neutral-es-v2   # v2: explicit repeated-structure consistency
  temperature: 0.2
  max_tokens: 4096
  fallback: fixture            # used when ANTHROPIC_API_KEY is absent

critic:
  provider: openai             # a DECORRELATED family from the translator
  model: gpt-5                 # upgraded from gpt-4o; pin a dated id if your account requires one
  prompt_version: critic-mqm-regionalism-v2   # v2: flag inconsistent rendering of a repeated phrase
  temperature: 0.0
  max_tokens: 2048
  fallback: deterministic      # validator-derived critic when OPENAI_API_KEY absent

qe:
  provider: local              # REAL open-weight model, in THIS container (no external service, no GPU)
  model: Xenova/paraphrase-multilingual-MiniLM-L12-v2   # cross-lingual embeddings (ONNX/CPU)
  dtype: q8                    # quantized int8 for fast CPU inference
  runs_in: container
  # Optional SOTA upgrade: deploy CometKiwi/xCOMET as a Python sidecar and set QE_SERVICE_URL.
  service_url_env: QE_SERVICE_URL
  # QE is a routing signal only (spec §15) — NEVER an approval signal; validators + humans decide.
  fallback: heuristic

versions:
  glossary_version: neutral-es-2026.1
  rules_version: neutralization-2026.1
